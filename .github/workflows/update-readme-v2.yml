name: 📄 Auto-update README

on:
  workflow_run:
    workflows: ["🖇️ Sync Leetcode"]
    types: [completed]

  schedule:
    - cron: "30 2 * * 0"

  workflow_dispatch:

jobs:
  update-readme:
    name: Fix folder names & rebuild README
    runs-on: ubuntu-latest

    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Step 1 — Fix wrong folder numbers
        run: python scripts/fix_folder_names.py

      - name: Step 2 — Rebuild README index & progress table
        run: python scripts/update_readme.py

      - name: Commit all changes
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add my-solutions/ README.md scripts/leetcode_cache.json
          git diff --staged --quiet || git commit -m "chore: fix folder names + auto-update README [skip ci]"
          git push
