name: 📄 Auto-update README

# Runs whenever a solution file is pushed to my-solutions/
on:
  push:
    branches: [main]
    paths:
      - "my-solutions/**"

jobs:
  update-readme:
    name: Rebuild Problem Index & Progress Table
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated README back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run README updater
        run: python scripts/update_readme.py

      - name: Commit updated README (if changed)
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/leetcode_cache.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "docs: auto-update README [skip ci]"
          git push
