name: Fix Folder Names (run once)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scripts/fix_folder_names.py
      - run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add my-solutions/ scripts/leetcode_cache.json
          git diff --staged --quiet || git commit -m "fix: correct LC problem numbers in folder names"
          git push
